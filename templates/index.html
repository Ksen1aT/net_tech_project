<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Чат</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial;
            background: #2a2a2a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .chat {
            width: 100%;
            max-width: 900px;
            height: 85vh;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            border-radius: 10px;
            overflow: hidden;
        }

        .header {
            background: #d68eb2;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .name-bar {
            padding: 10px;
            background: #333;
        }

        .name-bar input {
            width: 100%;
            padding: 8px;
            background: #444;
            border: none;
            color: white;
            border-radius: 5px;
        }

        @media (max-width: 768px) {
            .name-bar input {
                padding: 12px;
                font-size: 16px;
            }
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }

        .msg {
            max-width: 80%;
            margin-bottom: 10px;
            padding: 8px 12px;
            border-radius: 10px;
            word-wrap: break-word;
            word-break: break-word;
        }

        @media (max-width: 768px) {
            .msg {
                max-width: 85%;
                padding: 10px 14px;
            }
        }

        .msg.own {
            background: #d68eb2;
            color: white;
            align-self: flex-end;
        }

        .msg.other {
            background: #444;
            color: white;
            align-self: flex-start;
        }

        .msg .name {
            font-size: 10px;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .msg .text {
            font-size: 14px;
            line-height: 1.4;
        }

        .msg .time {
            font-size: 9px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .input-area {
            padding: 10px;
            background: #333;
        }

        .input-row input {
            width: 100%;
            padding: 10px;
            background: #444;
            border: none;
            color: white;
            border-radius: 20px;
            outline: none;
        }

        @media (max-width: 768px) {
            .input-row input {
                padding: 12px 15px;
                font-size: 16px;
                border-radius: 25px;
            }
        }

        .file-row {
            margin-top: 8px;
            display: flex;
            gap: 8px;
        }

        .file-row label {
            background: #555;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            font-size: 12px;
            display: inline-block;
            text-align: center;
        }

        .file-row button {
            background: #d68eb2;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .file-row label,
            .file-row button {
                padding: 12px;
                font-size: 14px;
                flex: 1;
            }
        }

        .status {
            text-align: center;
            padding: 10px;
            color: #888;
        }

        .preview {
            max-width: 100%;
            max-height: 300px;
            border-radius: 5px;
            margin-top: 5px;
            cursor: pointer;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
        }

        .modal img {
            margin: auto;
            display: block;
            max-width: 90%;
            max-height: 90%;
            margin-top: 5%;
        }

        .close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: white;
            font-size: 40px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="chat">
    <div class="header">ЧАТ</div>

    <div class="name-bar">
        <input type="text" id="username" placeholder="Ваше имя">
    </div>

    <div class="messages" id="messages">
        <div class="status">Загрузка...</div>
    </div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" id="msgInput" placeholder="Сообщение...">
        </div>
        <div class="file-row">
            <label for="fileInput">Выбрать файл</label>
            <input type="file" id="fileInput" style="display:none" accept="image/*,application/pdf,text/plain">
            <button onclick="sendFile()">Отправить</button>
        </div>
    </div>
</div>

<div id="modal" class="modal">
    <span class="close">&times;</span>
    <img id="modalImg">
</div>

<script src="{{ url_for('static', filename='scripts.js') }}"></script>
</body>
</html>
